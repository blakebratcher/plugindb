name: Validate seed.json

on:
  pull_request:
    paths:
      - "data/**"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Validate seed.json
        run: python -m plugindb.seed --validate

      - name: Test seed import
        run: |
          python -c "
          from plugindb.database import create_schema, get_connection
          from plugindb.seed import load_seed, seed_database
          conn = get_connection(':memory:')
          create_schema(conn)
          data = load_seed('data/seed.json')
          counts = seed_database(conn, data)
          print(f'Seed import OK: {counts[\"plugins\"]} plugins, {counts[\"manufacturers\"]} manufacturers, {counts[\"aliases\"]} aliases')
          conn.close()
          "

      - name: Run full test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Report seed stats
        run: |
          python -c "
          import json
          data = json.load(open('data/seed.json'))
          p = len(data.get('plugins', []))
          m = len(data.get('manufacturers', []))
          cats = {}
          for pl in data['plugins']:
              c = pl.get('category', 'unknown')
              cats[c] = cats.get(c, 0) + 1
          print('## Seed Summary')
          print(f'- **{p}** plugins from **{m}** manufacturers')
          for c, n in sorted(cats.items()):
              print(f'  - {c}: {n}')
          " >> $GITHUB_STEP_SUMMARY
